<!-- Contact -->
<section class="section" style="padding-top: 8rem;">
    <div class="container">
        <div class="section-header">
            <h1 class="section-title"><span class="gradient">Get in Touch</span></h1>
            <p class="section-subtitle">Have a project in mind, want to collaborate, or just want to say hi?</p>
        </div>

        <div class="contact-wrapper">
            <form action="https://formspree.io/f/mjkbwzwv" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required />
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" />
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Tell me about your project or idea..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>

        <!-- Direct contact info -->
        <div style="display:flex;justify-content:center;gap:2.5rem;margin-top:3rem;flex-wrap:wrap;">
            <a href="mailto:Sirajpatnam25@gmail.com" style="display:flex;align-items:center;gap:.6rem;color:var(--text-2);font-size:.88rem;transition:color .3s;">
                <i class="bi bi-envelope" style="color:var(--cyan);font-size:1.1rem;"></i> Sirajpatnam25@gmail.com
            </a>
            <a href="tel:+13143939371" style="display:flex;align-items:center;gap:.6rem;color:var(--text-2);font-size:.88rem;transition:color .3s;">
                <i class="bi bi-telephone" style="color:var(--cyan);font-size:1.1rem;"></i> (314) 393-9371
            </a>
            <a href="https://www.linkedin.com/in/siraj-patnam-b87883191/" target="_blank" style="display:flex;align-items:center;gap:.6rem;color:var(--text-2);font-size:.88rem;transition:color .3s;">
                <i class="bi bi-linkedin" style="color:var(--cyan);font-size:1.1rem;"></i> LinkedIn
            </a>
        </div>
    </div>
</section>
